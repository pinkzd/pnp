<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardim Infinito 🌸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<a href="../../index.html" class="voltar">← VoltarPink'n'Punk</a>

<section class="app-jardim">

    <header>
        <h1>🌸 Jardim Infinito</h1>
        <p>Cada flor representa um momento que cultivamos juntos.</p>
    </header>

    <div class="ceu">
        <div class="nuvem n1">☁️</div>
        <div class="nuvem n2">☁️</div>
        <div class="sol">☀️</div>
    </div>

    <main class="campo" id="campo"></main>

    <footer>
        <span id="contadorFlores">0 flores cultivadas ❤️</span>
    </footer>

</section>

<div class="modal" id="modal">
    <div class="modal-card">
        <button id="fechar">×</button>

        <div id="modalEmoji" class="modal-emoji"></div>
        <h2 id="modalTitulo"></h2>
        <p id="modalData" class="data"></p>
        <p id="modalTexto"></p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
